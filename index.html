<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy | Premium Learning Community</title>
    <meta name="description" content="A premium social platform for modern educational communities. Connect, learn, and grow together.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- App Shell -->
    <div id="app">
        <!-- Auth Screen (Initial State) -->
        <main id="auth-screen" class="auth-container animate-fade-in">
            <div class="auth-card glass">
                <div class="auth-header">
                    <h1 class="gradient-text">Academy</h1>
                    <p>Elevate your learning experience.</p>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign In
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="#" id="toggle-auth">Sign Up</a></p>
                </div>
            </div>
        </main>

        <!-- Main App Layout (Hidden initially) -->
        <div id="main-layout" style="display: none;">
            <nav class="sidebar glass">
                <div class="nav-logo gradient-text">AC</div>
                <div class="nav-items">
                    <div class="nav-item active" id="nav-home">Home</div>
                    <div class="nav-item" id="nav-explore">Explore</div>
                    <div class="nav-item" id="nav-notifications">Notifications</div>
                    <div class="nav-item" id="nav-messages">Messages</div>
                    <div class="nav-item" id="nav-profile">Profile</div>
                </div>
                
                <button class="btn btn-primary" id="btn-create-post" style="margin-top: auto;">
                    + New Post
                </button>
            </nav>
            
            <main class="content-area">
                <header class="top-bar">
                    <h2 id="view-title">Home Feed</h2>
                    <div class="user-pill glass" id="user-pill-btn" style="cursor: pointer;">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" class="avatar-sm">
                        <span id="username-display">User</span>
                    </div>
                </header>
                
                <!-- Feed View -->
                <div id="feed-view">
                    <div id="feed-container" class="feed-grid">
                        <!-- Posts will be injected here -->
                    </div>
                </div>

                <!-- Profile View (Hidden) -->
                <div id="profile-view" style="display: none;" class="animate-fade-in">
                    <div class="profile-header glass">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" class="avatar-lg">
                        <div class="profile-info">
                            <h2 id="profile-name">User Name</h2>
                            <p id="profile-email" class="text-muted">user@example.com</p>
                            <div class="profile-stats">
                                <span><strong>12</strong> Courses</span>
                                <span><strong>450</strong> Points</span>
                                <span><strong>89</strong> Followers</span>
                            </div>
                        </div>
                    </div>
                    <div class="profile-content">
                        <h3>My Learning Activity</h3>
                        <div id="user-posts-container" class="feed-grid" style="margin-top: 20px;">
                            <!-- User's posts will go here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Create Post Modal -->
        <div id="create-post-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content glass animate-fade-in">
                <h3>Create New Post</h3>
                <textarea id="post-input" class="input-field" placeholder="What's on your mind?" rows="4" style="margin-top: 16px;"></textarea>
                <div class="modal-actions" style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 12px;">
                    <button class="btn" id="btn-cancel-post">Cancel</button>
                    <button class="btn btn-primary" id="btn-submit-post">Post to Academy</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="app.js" type="module"></script>
</body>
</html>
